<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <!-- 背景 -->
  <rect width="512" height="512" rx="80" fill="#f5f0e8"/>

  <!-- 和紙の横線 -->
  <line x1="80" y1="160" x2="432" y2="160" stroke="#e0d8c8" stroke-width="2"/>
  <line x1="80" y1="220" x2="432" y2="220" stroke="#e0d8c8" stroke-width="2"/>
  <line x1="80" y1="280" x2="432" y2="280" stroke="#e0d8c8" stroke-width="2"/>
  <line x1="80" y1="340" x2="432" y2="340" stroke="#e0d8c8" stroke-width="2"/>

  <!-- 朱の縦線 -->
  <line x1="136" y1="100" x2="136" y2="420" stroke="#c0392b" stroke-width="2" opacity="0.35"/>

  <!-- 禅の文字（シンプル化した漢字風アイコン） -->
  <!-- 上の横線（示偏） -->
  <rect x="170" y="130" width="170" height="12" rx="6" fill="#2c2416"/>
  <!-- 示偏の縦 -->
  <rect x="250" y="130" width="12" height="55" rx="4" fill="#2c2416"/>
  <!-- 左右の点 -->
  <rect x="185" y="160" width="10" height="26" rx="3" fill="#2c2416"/>
  <rect x="315" y="160" width="10" height="26" rx="3" fill="#2c2416"/>

  <!-- 下部の単 -->
  <rect x="170" y="210" width="170" height="10" rx="5" fill="#2c2416"/>
  <rect x="215" y="210" width="10" height="40" rx="4" fill="#2c2416"/>
  <rect x="285" y="210" width="10" height="40" rx="4" fill="#2c2416"/>
  <rect x="170" y="248" width="170" height="10" rx="5" fill="#2c2416"/>
  <rect x="250" y="258" width="12" height="50" rx="4" fill="#2c2416"/>
  <rect x="170" y="300" width="170" height="10" rx="5" fill="#2c2416"/>

  <!-- チェックマーク（朱色） -->
  <polyline points="175,370 210,405 340,310" stroke="#c0392b" stroke-width="18" stroke-linecap="round" stroke-linejoin="round" fill="none"/>
</svg>
